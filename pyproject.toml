[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cavefinder-auth"
version = "0.2.0"
description = "Shared JWT verification + FastAPI middleware for CaveFinder Identity Provider client apps (georef, surveylens, cavefinder)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "UNLICENSED" }
authors = [{ name = "CaveFinder", email = "team@cavefinder.app" }]
dependencies = [
  "pyjwt[crypto]>=2.8",
  "cryptography>=41",
  "httpx>=0.25",
  "starlette>=0.36",
]

[project.optional-dependencies]
testing = ["pytest>=8", "pytest-asyncio>=0.23", "fastapi>=0.110"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
cavefinder_auth = ["py.typed"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
